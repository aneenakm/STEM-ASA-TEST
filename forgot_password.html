<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Online Subject Examination</title>
    <link rel="stylesheet" href="index.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass auth-card">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Forgot Password</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Enter your email to reset your password</p>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send Reset
                    Link</button>
            </form>

            <div id="status-message" style="margin-top: 1.5rem; text-align: center; display: none;">
                <p id="statusText" style="padding: 10px; border-radius: 8px;"></p>
                <div id="simulatedLink"
                    style="margin-top: 15px; display: none; padding: 15px; background: rgba(255, 255, 255, 0.1); border-radius: 8px; border: 1px dashed var(--primary);">
                    <p style="font-size: 0.8rem; margin-bottom: 10px;">Simulation: Secure link sent to your email</p>
                    <a id="resetBtn" href="#" class="btn btn-primary"
                        style="text-decoration: none; display: inline-block;">Reset Password Now</a>
                    <p style="font-size: 0.75rem; margin-top: 10px; color: #aaa;">This link will expire in 15 minutes.
                    </p>
                </div>
            </div>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Back to <a href="login.html" style="color: var(--primary); text-decoration: none;">Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email);

            const statusDiv = document.getElementById('status-message');
            const statusText = document.getElementById('statusText');
            const simulatedLink = document.getElementById('simulatedLink');
            const resetBtn = document.getElementById('resetBtn');

            statusDiv.style.display = 'block';

            if (user) {
                // Generate secure token
                const token = btoa(Math.random().toString(36).substring(2) + Date.now());
                const expiry = Date.now() + (15 * 60 * 1000); // 15 mins expiry

                // Store token in "database" (localStorage)
                const resetTokens = JSON.parse(localStorage.getItem('passwordResetTokens') || '{}');
                resetTokens[token] = { email, expiry };
                localStorage.setItem('passwordResetTokens', JSON.stringify(resetTokens));

                statusText.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                statusText.style.color = 'var(--success)';
                statusText.innerText = 'If an account exists for this email, you will receive a reset link shortly.';

                simulatedLink.style.display = 'block';
                resetBtn.href = `reset_password.html?token=${token}`;

                // Hide form to emphasize "email sent" state
                document.getElementById('forgotForm').style.display = 'none';
            } else {
                statusText.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                statusText.style.color = 'var(--error)';
                statusText.innerText = 'Email address not found!';
                simulatedLink.style.display = 'none';
            }
        });
    </script>
</body>

</html>
