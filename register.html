<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Subject Examination</title>
    <link rel="stylesheet" href="index.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass auth-card">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Create Account</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Join the examination portal</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role">Select Role</label>
                    <select id="role" class="form-control" required>
                        <option value="" disabled selected>Choose your role</option>
                        <option value="admin">System Administrator</option>
                        <option value="teacher">STEM (Teacher)</option>
                        <option value="student">ASA (Student)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Already have an account? <a href="login.html"
                    style="color: var(--primary); text-decoration: none;">Login here</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const role = document.getElementById('role').value;
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: role,
                course: role === 'admin' ? 'ADMIN' : (role === 'teacher' ? 'STEM' : 'ASA')
            };

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.find(u => u.email === userData.email)) {
                alert('Email already registered!');
                return;
            }

            users.push(userData);
            localStorage.setItem('users', JSON.stringify(users));
            alert('Registration successful! Please login.');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
