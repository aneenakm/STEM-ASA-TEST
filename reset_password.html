<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Online Subject Examination</title>
    <link rel="stylesheet" href="index.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="glass auth-card" id="resetCard">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem; text-align: center;">Reset Password</h2>
            <p id="userEmail" style="text-align: center; margin-bottom: 2rem; font-weight: bold;"></p>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••" required
                        minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••" required
                        minlength="6">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Update
                    Password</button>
            </form>

            <div id="errorView" style="display: none; text-align: center;">
                <div
                    style="background-color: rgba(239, 68, 68, 0.1); color: var(--error); padding: 20px; border-radius: 8px; margin-bottom: 1.5rem;">
                    <h3 id="errorTitle">Invalid Link</h3>
                    <p id="errorMsg">This password reset link is invalid or has expired.</p>
                </div>
                <a href="forgot_password.html" class="btn btn-primary"
                    style="width: 100%; text-decoration: none; display: inline-block;">Request New Link</a>
            </div>

            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">
                Remembered it? <a href="login.html" style="color: var(--primary); text-decoration: none;">Back to
                    Login</a>
            </p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        const resetForm = document.getElementById('resetForm');
        const errorView = document.getElementById('errorView');
        const userEmailText = document.getElementById('userEmail');
        const errorTitle = document.getElementById('errorTitle');
        const errorMsg = document.getElementById('errorMsg');

        // Validate Token
        const resetTokens = JSON.parse(localStorage.getItem('passwordResetTokens') || '{}');
        const tokenData = resetTokens[token];

        let isValid = false;
        let email = '';

        if (tokenData) {
            if (Date.now() < tokenData.expiry) {
                isValid = true;
                email = tokenData.email;
                userEmailText.innerText = `Resetting password for: ${email}`;
            } else {
                errorTitle.innerText = "Link Expired";
                errorMsg.innerText = "This reset link expired after 15 minutes. Please request a new one.";
            }
        }

        if (!isValid) {
            resetForm.style.display = 'none';
            userEmailText.style.display = 'none';
            errorView.style.display = 'block';
        }

        resetForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }

            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.email === email);

            if (userIndex !== -1) {
                // Update password
                users[userIndex].password = newPassword;
                localStorage.setItem('users', JSON.stringify(users));

                // Invalidate the token after use
                delete resetTokens[token];
                localStorage.setItem('passwordResetTokens', JSON.stringify(resetTokens));

                alert('Password updated successfully!');
                window.location.href = 'login.html';
            } else {
                alert('Error: User not found!');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>

</html>
